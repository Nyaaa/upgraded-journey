version: '3'

services:
  postgres:
    image: postgres
    restart: unless-stopped
    container_name: 'FSTR_DB'
    environment:
      POSTGRES_USER: ${FSTR_DB_LOGIN:-postgres}
      POSTGRES_PASSWORD: ${FSTR_DB_PASS:-changeme}
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "${FSTR_DB_PORT:-5432}:${FSTR_DB_PORT:-5432}"


  web:
    build: .
    restart: unless-stopped
    container_name: 'FSTR_API'
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      FSTR_DB_LOGIN: ${FSTR_DB_LOGIN:-postgres}
      FSTR_DB_PASS: ${FSTR_DB_PASS:-changeme}
    ports:
      - '8000:8000'
    depends_on:
      - postgres

volumes:
  postgres:
